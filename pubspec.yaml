name: chitflow
description: ChitFlow - Digital Chit Fund Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.1.2

  # File picking & PDF
   # File picking & PDF
    # File picking & PDF
  file_picker: ^8.0.7
  url_launcher: ^6.3.0
  http: ^1.2.0
  path_provider: ^2.1.3
  open_filex: ^4.5.0

  # Utilities
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
